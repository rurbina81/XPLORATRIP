<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Frame 2 — Evidencia: aerolíneas y frecuencia · 1080x1920 · 4s -->
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Inter";
          src: url("assets/fonts/inter-600.woff2") format("woff2");
          font-weight: 600;
          font-style: normal;
        }
        @font-face {
          font-family: "Inter";
          src: url("assets/fonts/inter-700.woff2") format("woff2");
          font-weight: 700;
          font-style: normal;
        }
        @font-face {
          font-family: "Inter";
          src: url("assets/fonts/inter-800.woff2") format("woff2");
          font-weight: 800;
          font-style: normal;
        }

        /* Root styled via #root — never a class on the composition root */
        #root {
          position: absolute;
          inset: 0;
          width: 1080px;
          height: 1920px;
          overflow: hidden;
          font-family: "Inter", sans-serif;
        }

        /* ── Track 0 · full-bleed navy ground (never on #root) ───────── */
        .f02-ground {
          position: absolute;
          inset: 0;
          background: #0b1d3a;
        }
        .f02-ground::before {
          /* signature 45° hatch, 6% ink — texture, never depth */
          content: "";
          position: absolute;
          inset: 0;
          background-image: repeating-linear-gradient(
            45deg,
            transparent 0 20px,
            rgba(0, 0, 0, 0.06) 20px 40px
          );
        }

        /* ── Track 1 · colonial-city band, top ~35%, dim under navy veil ── */
        .f02-band {
          position: absolute;
          top: 0;
          left: 0;
          width: 1080px;
          height: 672px;
          overflow: hidden;
        }
        #f02-band-img {
          display: block;
          width: 100%;
          height: 100%;
          object-fit: cover;
          filter: saturate(0.75) brightness(0.9);
          will-change: transform;
        }
        .f02-veil {
          position: absolute;
          inset: 0;
          background: rgba(11, 29, 58, 0.5);
        }

        /* ── Track 2 · section-label over the band (asymmetric 70/30) ── */
        .f02-label {
          position: absolute;
          left: 54px;
          top: 566px;
          font-size: 34px;
          font-weight: 700;
          letter-spacing: 9px;
          text-transform: uppercase;
          color: #eabe48;
          white-space: nowrap;
        }

        /* ── Track 3 · airline chip stack ───────────────────────────── */
        .f02-chips {
          position: absolute;
          left: 130px;
          top: 740px;
          width: 820px;
          display: flex;
          flex-direction: column;
          gap: 22px;
        }
        .f02-chip {
          height: 120px;
          border: 1px solid #ffffff;
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(255, 255, 255, 0.05);
          font-size: 46px;
          font-weight: 600;
          letter-spacing: 4px;
          text-transform: uppercase;
          color: #ffffff;
          will-change: transform, opacity;
        }

        /* ── Track 4 · sello display + support line ─────────────────── */
        .f02-payoff {
          position: absolute;
          left: 0;
          right: 0;
          top: 1205px;
          text-align: center;
        }
        .f02-sello {
          font-size: 150px;
          line-height: 1.05;
          font-weight: 800;
          letter-spacing: 4px;
          text-transform: uppercase;
          color: #eabe48;
          will-change: transform, opacity, filter;
        }
        .f02-support {
          margin-top: 28px;
          font-size: 26px;
          font-weight: 700;
          letter-spacing: 4px;
          text-transform: uppercase;
          color: #ffffff;
          will-change: transform, opacity;
        }
      </style>

      <div id="root" data-composition-id="02-evidencia" data-width="1080" data-height="1920">
        <!-- Track 0 — navy ground -->
        <div
          class="clip f02-ground"
          data-start="0"
          data-duration="4"
          data-track-index="0"
        ></div>

        <!-- Track 1 — background band: ciudad colonial, dim ~45% under navy veil -->
        <div class="clip f02-band" data-start="0" data-duration="4" data-track-index="1">
          <img
            id="f02-band-img"
            src="assets/ciudad-colonial-venezolana-con-arquitect.jpg"
            alt=""
          />
          <div class="f02-veil"></div>
        </div>

        <!-- Track 2 — section label (wipe reveal) -->
        <div
          id="f02-label"
          class="clip f02-label"
          data-start="0"
          data-duration="4"
          data-track-index="2"
        >
          YA ESTÁN OPERANDO
        </div>

        <!-- Track 3 — chip stack, one per beat (pre-reveal opacity-0 + wing
             offsets are intentional: each chip enters on its beat 1.0/1.55/2.1s) -->
        <div
          class="clip f02-chips"
          data-start="0"
          data-duration="4"
          data-track-index="3"
          data-layout-allow-occlusion
          data-layout-allow-overflow
        >
          <div id="f02-chip-1" class="f02-chip">AMERICAN AIRLINES</div>
          <div id="f02-chip-2" class="f02-chip">LASER</div>
          <div id="f02-chip-3" class="f02-chip">GLOBAL X</div>
        </div>

        <!-- Track 4 — sello + support (pre-reveal scale/opacity states are
             intentional: stamp-in at 2.6s, support line at 3.3s) -->
        <div
          class="clip f02-payoff"
          data-start="0"
          data-duration="4"
          data-track-index="4"
          data-layout-allow-occlusion
          data-layout-allow-overflow
        >
          <div id="f02-sello" class="f02-sello">
            <div>VUELOS</div>
            <div>DIARIOS</div>
          </div>
          <div id="f02-support" class="f02-support">operando desde abril 2026</div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        /* Scene 1 (0.0–1.0s) — band settles, label wipes in (short wipe) */
        tl.fromTo(
          "#f02-band-img",
          { scale: 1.06 },
          { scale: 1.0, duration: 1.0, ease: "power2.out" },
          0,
        );
        tl.fromTo(
          "#f02-label",
          { clipPath: "inset(0% 100% 0% 0%)" },
          { clipPath: "inset(0% 0% 0% 0%)", duration: 0.5, ease: "power3.out" },
          0.25,
        );

        /* Scene 2 (1.0–2.6s) — chips assemble one per beat, alternating wings,
           short slide directly into slot, power3 settle (grid-card-assemble) */
        const chips = [
          ["#f02-chip-1", -160, 1.0],
          ["#f02-chip-2", 160, 1.55],
          ["#f02-chip-3", -160, 2.1],
        ];
        chips.forEach(([sel, dx, beat]) => {
          tl.fromTo(
            sel,
            { x: dx, opacity: 0 },
            { x: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
            beat,
          );
        });

        /* Scene 3 (2.6–4.0s) — sello stamps in dry (hard slam, fast settle,
           no overshoot), support line on its own beat, then held */
        tl.fromTo(
          "#f02-sello",
          { scale: 1.45, opacity: 0, filter: "blur(10px)" },
          {
            scale: 1,
            opacity: 1,
            filter: "blur(0px)",
            duration: 0.38,
            ease: "power4.out",
          },
          2.6,
        );
        tl.fromTo(
          "#f02-support",
          { y: 16, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.35, ease: "power3.out" },
          3.3,
        );

        window.__timelines["02-evidencia"] = tl;
      </script>
    </template>
  </body>
</html>
