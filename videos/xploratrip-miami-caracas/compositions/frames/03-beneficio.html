<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- Frame 3 — Beneficio: precio y organización · 1080x1920 · 3.5s -->
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Inter";
          src: url("assets/fonts/inter-400.woff2") format("woff2");
          font-weight: 400;
          font-style: normal;
        }
        @font-face {
          font-family: "Inter";
          src: url("assets/fonts/inter-600.woff2") format("woff2");
          font-weight: 600;
          font-style: normal;
        }
        @font-face {
          font-family: "Inter";
          src: url("assets/fonts/inter-700.woff2") format("woff2");
          font-weight: 700;
          font-style: normal;
        }
        @font-face {
          font-family: "Inter";
          src: url("assets/fonts/inter-800.woff2") format("woff2");
          font-weight: 800;
          font-style: normal;
        }

        /* Root styled via #root — never a class on the composition root */
        #root {
          position: absolute;
          inset: 0;
          width: 1080px;
          height: 1920px;
          overflow: hidden;
          font-family: "Inter", sans-serif;
        }

        /* ── Track 0 · full-bleed cream ground (never on #root) ──────── */
        .f03-ground {
          position: absolute;
          inset: 0;
          background: #ffffff;
        }
        .f03-ground::before {
          /* signature 45° hatch, ultra-light navy — texture, never depth */
          content: "";
          position: absolute;
          inset: 0;
          background-image: repeating-linear-gradient(
            45deg,
            transparent 0 20px,
            rgba(11, 29, 58, 0.03) 20px 40px
          );
        }

        /* ── Track 1 · label DESDE ────────────────────────────────────── */
        .f03-label {
          position: absolute;
          left: 0;
          right: 0;
          top: 430px;
          text-align: center;
          font-size: 44px;
          font-weight: 700;
          letter-spacing: 14px;
          text-transform: uppercase;
          color: #0b1d3a;
          will-change: transform, opacity;
        }

        /* ── Track 2 · ring + numeral count-up (signature) ───────────── */
        .f03-stat {
          position: absolute;
          left: 0;
          right: 0;
          top: 560px;
          height: 760px;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .f03-ring {
          position: absolute;
          left: 50%;
          top: 50%;
          width: 720px;
          height: 720px;
          margin-left: -360px;
          margin-top: -360px;
        }
        .f03-ring circle {
          fill: none;
          stroke: #eabe48;
          stroke-width: 10;
        }
        .f03-ring .f03-ring-track {
          stroke: rgba(11, 29, 58, 0.08);
        }
        #f03-num {
          position: relative;
          font-size: 250px;
          line-height: 1;
          font-weight: 800;
          letter-spacing: 2px;
          color: #0b1d3a;
          font-variant-numeric: tabular-nums;
          will-change: transform, opacity;
        }

        /* ── Track 3 · promesa de marca ──────────────────────────────── */
        .f03-line {
          position: absolute;
          left: 90px;
          right: 90px;
          top: 1370px;
          text-align: center;
          font-size: 52px;
          line-height: 1.3;
          font-weight: 600;
          color: #0b1d3a;
          will-change: transform, opacity;
        }

        /* ── Track 4 · polaroid supporting (esquina inferior-izquierda) ─ */
        .f03-polaroid {
          position: absolute;
          left: 64px;
          top: 1150px;
          width: 250px;
          padding: 12px 12px 40px;
          background: #ffffff;
          border: 1px solid #0b1d3a;
          will-change: transform, opacity;
        }
        .f03-polaroid img {
          display: block;
          width: 100%;
          height: 210px;
          object-fit: cover;
          filter: saturate(0.9);
        }
      </style>

      <div id="root" data-composition-id="03-beneficio" data-width="1080" data-height="1920">
        <!-- Track 0 — cream ground -->
        <div
          class="clip f03-ground"
          data-start="0"
          data-duration="3.5"
          data-track-index="0"
        ></div>

        <!-- Track 1 — DESDE -->
        <div
          id="f03-label"
          class="clip f03-label"
          data-start="0"
          data-duration="3.5"
          data-track-index="1"
        >
          DESDE
        </div>

        <!-- Track 2 — ring sweep + $ count-up (dataviz-countup signature) -->
        <div class="clip f03-stat" data-start="0" data-duration="3.5" data-track-index="2">
          <svg class="f03-ring" viewBox="0 0 720 720" aria-hidden="true">
            <circle class="f03-ring-track" cx="360" cy="360" r="340" />
            <circle
              id="f03-ring-fill"
              cx="360"
              cy="360"
              r="340"
              pathLength="100"
              transform="rotate(-90 360 360)"
              style="stroke-dasharray: 100; stroke-dashoffset: 100"
            />
          </svg>
          <div id="f03-num">$0</div>
        </div>

        <!-- Track 4 — polaroid supporting, un beat después del arranque -->
        <div
          id="f03-polaroid"
          class="clip f03-polaroid"
          data-start="1.4"
          data-duration="2.1"
          data-track-index="4"
        >
          <img src="assets/pareja-caminando-en-playa-del-caribe-al-.jpg" alt="" />
        </div>

        <!-- Track 3 — la promesa, en su propio beat -->
        <div
          id="f03-line"
          class="clip f03-line"
          data-start="2.2"
          data-duration="1.3"
          data-track-index="3"
        >
          XPLORATRIP te organiza todo el viaje
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        /* Scene 1 (0.0–0.6s) — "DESDE" entra arriba-centro, pequeño y tracked */
        tl.fromTo(
          "#f03-label",
          { y: 26, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.45, ease: "power3.out" },
          0.05,
        );

        /* Scene 2 (0.6–2.2s) — numeral cuenta 0→499 con el ring barriendo su
           circunferencia en sincronía (signature del blueprint). Count-up
           determinista: el valor deriva del progreso del timeline. */
        tl.fromTo(
          "#f03-num",
          { opacity: 0, scale: 0.92 },
          { opacity: 1, scale: 1, duration: 0.3, ease: "power2.out" },
          0.6,
        );
        const counter = { v: 0 };
        tl.to(
          counter,
          {
            v: 499,
            duration: 1.6,
            ease: "power2.out",
            onUpdate() {
              const el = document.getElementById("f03-num");
              if (el) el.textContent = "$" + Math.round(counter.v);
            },
          },
          0.6,
        );
        tl.fromTo(
          "#f03-ring-fill",
          { strokeDashoffset: 100 },
          { strokeDashoffset: 0, duration: 1.6, ease: "power2.out" },
          0.6,
        );

        /* La polaroid asienta un beat después del arranque (1.4s), rotación
           constante en ambos extremos del tween (sin conflicto CSS/GSAP). */
        tl.fromTo(
          "#f03-polaroid",
          { y: 60, opacity: 0, rotation: 3 },
          { y: 0, opacity: 1, rotation: 3, duration: 0.5, ease: "power3.out" },
          1.4,
        );

        /* Scene 3 (2.2–3.5s) — la promesa aparece en su beat; luego held read
           total: el precio quieto, sin drift. Sin exit (el root lo posee). */
        tl.fromTo(
          "#f03-line",
          { y: 30, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.45, ease: "power3.out" },
          2.2,
        );

        window.__timelines["03-beneficio"] = tl;
      </script>
    </template>
  </body>
</html>
