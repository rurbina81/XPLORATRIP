<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- head is source-file metadata only; the runtime clones ONLY <template> contents -->
    <title>Frame 4 — CTA: cotiza por WhatsApp</title>
  </head>
  <body>
    <template>
      <style>
        /* Fonts ship with the project — real files, no CDN */
        @font-face {
          font-family: "Inter";
          font-weight: 400;
          font-style: normal;
          font-display: block;
          src: url("assets/fonts/inter-400.woff2") format("woff2");
        }
        @font-face {
          font-family: "Inter";
          font-weight: 600;
          font-style: normal;
          font-display: block;
          src: url("assets/fonts/inter-600.woff2") format("woff2");
        }
        @font-face {
          font-family: "Inter";
          font-weight: 700;
          font-style: normal;
          font-display: block;
          src: url("assets/fonts/inter-700.woff2") format("woff2");
        }
        @font-face {
          font-family: "Inter";
          font-weight: 800;
          font-style: normal;
          font-display: block;
          src: url("assets/fonts/inter-800.woff2") format("woff2");
        }

        /* Root styled via #root — never a class on the data-composition-id element */
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          container-type: size;
          font-family: "Inter", sans-serif;
        }

        /* Full-bleed ground lives on a clip layer, never on #root.
           Navy surface + the signature 45° hatch (6% ink) as ::before overlay. */
        #cta4-bg {
          position: absolute;
          inset: 0;
          background: #0b1d3a;
        }
        #cta4-bg::before {
          content: "";
          position: absolute;
          inset: 0;
          background-image: repeating-linear-gradient(
            45deg,
            transparent 0 20px,
            rgba(0, 0, 0, 0.06) 20px 40px
          );
        }

        #cta4-stage {
          position: absolute;
          inset: 0;
        }

        /* Scene 1 — glow dorado detrás del lockup (rgba dorada, no bokeh) */
        #cta4-glow {
          position: absolute;
          top: 180px;
          left: 0;
          right: 0;
          margin: 0 auto;
          width: 760px;
          height: 760px;
          border-radius: 50%;
          background: radial-gradient(
            closest-side,
            rgba(234, 190, 72, 0.5) 0%,
            rgba(234, 190, 72, 0.18) 45%,
            rgba(234, 190, 72, 0) 72%
          );
          opacity: 0;
        }

        /* Scene 1 — el logo (cutout) ~40% del canvas, upper-third, esquinas rectas */
        #cta4-logo {
          position: absolute;
          top: 330px;
          left: 0;
          right: 0;
          margin: 0 auto;
          display: block;
          width: 430px;
          height: 430px;
          object-fit: cover;
          transform-origin: 50% 50%;
          will-change: transform, opacity;
        }

        /* Scene 1 — wordmark que completa el lockup (tinta blanca sobre navy) */
        #cta4-word {
          position: absolute;
          top: 802px;
          left: 0;
          right: 0;
          text-align: center;
          font-weight: 800;
          font-size: 64px;
          line-height: 1;
          letter-spacing: 14px;
          padding-left: 14px; /* compensa el tracking del último glifo */
          text-transform: uppercase;
          color: #ffffff;
          will-change: transform, opacity;
        }

        /* Scene 2 — píldora CTA dorada, tinta navy, ÚNICA forma redondeada del video */
        #cta4-pill-row {
          position: absolute;
          top: 1090px;
          left: 0;
          right: 0;
          display: flex;
          justify-content: center;
        }
        #cta4-pill {
          position: relative;
          display: inline-flex;
          align-items: center;
          background: #eabe48;
          color: #0b1d3a;
          border-radius: 999px;
          padding: 34px 52px;
          font-weight: 700;
          font-size: 40px;
          line-height: 1;
          letter-spacing: 2px;
          text-transform: uppercase;
          white-space: nowrap;
          transform-origin: 50% 50%;
          will-change: transform, opacity;
        }
        /* Scene 2 — contorno interior que se dibuja una vez (stroke draw, tinta navy sobre dorado) */
        #cta4-pill-stroke {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          overflow: visible;
          pointer-events: none;
        }
        #cta4-pill-stroke-rect {
          x: 6px;
          y: 6px;
          width: calc(100% - 12px);
          height: calc(100% - 12px);
          rx: 60px; /* clamps to half-height automatically */
          fill: none;
          stroke: #0b1d3a;
          stroke-width: 3;
          stroke-linecap: round;
          /* pathLength="100" normaliza — dash apenas mayor evita costura al cierre */
          stroke-dasharray: 100.6;
          stroke-dashoffset: 100.6;
        }

        /* Scene 3 — URL revelada por wipe izquierda→derecha (clip-path inset) */
        #cta4-url-wrap {
          position: absolute;
          top: 1300px;
          left: 260px;
          width: 560px;
          height: 70px;
          display: flex;
          align-items: center;
          justify-content: center;
          clip-path: inset(0% 100% 0% 0%);
        }
        #cta4-url {
          font-weight: 600;
          font-size: 46px;
          line-height: 1;
          letter-spacing: 2px;
          color: #ffffff;
          white-space: nowrap;
        }
        /* La arista dorada que lidera el wipe */
        #cta4-url-edge {
          position: absolute;
          top: 1292px;
          left: 260px;
          width: 6px;
          height: 86px;
          background: #eabe48;
          box-shadow: 0 0 16px rgba(234, 190, 72, 0.8);
          opacity: 0;
          will-change: transform, opacity;
        }
      </style>

      <div
        id="root"
        data-composition-id="04-cta"
        data-width="1080"
        data-height="1920"
        data-duration="3.5"
      >
        <!-- Ground full-bleed en su propio clip (track 0) -->
        <div id="cta4-bg" class="clip" data-start="0" data-duration="3.5" data-track-index="0"></div>

        <!-- Lockup + CTA + URL (track 1); los reveals los marca el timeline -->
        <div id="cta4-stage" class="clip" data-start="0" data-duration="3.5" data-track-index="1">
          <div id="cta4-glow"></div>
          <img id="cta4-logo" src="assets/logo.webp" alt="XPLORATRIP" />
          <div id="cta4-word">Xploratrip</div>

          <div id="cta4-pill-row">
            <div id="cta4-pill">
              <span>Cotiza gratis por WhatsApp</span>
              <svg id="cta4-pill-stroke" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect id="cta4-pill-stroke-rect" pathLength="100"></rect>
              </svg>
            </div>
          </div>

          <div id="cta4-url-wrap">
            <div id="cta4-url">www.xploratrip.com</div>
          </div>
          <div id="cta4-url-edge"></div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        /* ── Scene 1 (0.0–1.0s) — el lockup se ensambla al centro ─────────────
           Entrada directa (adapt del blueprint: sin push-through): escala
           0.9→1.0 con settle power3 (spring-pop-entrance, variante calma) y el
           glow dorado que se enciende detrás. fromTo siempre: correcto a t=0. */
        tl.fromTo(
          "#cta4-logo",
          { scale: 0.9, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.85, ease: "power3.out" },
          0.05
        );
        tl.fromTo(
          "#cta4-glow",
          { opacity: 0 },
          { opacity: 0.45, duration: 0.65, ease: "power2.out" },
          0.3
        );
        tl.fromTo(
          "#cta4-word",
          { y: 26, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
          0.55
        );

        /* ── Scene 2 (1.0–2.2s) — pill rise + stroke draw ──────────────────────
           La píldora sube desde abajo del lockup y asienta (power3, sin
           overshoot). En su beat (1.8s) el contorno se dibuja UNA vez
           (svg-path-draw: dashoffset 100.6→0 sobre pathLength normalizado,
           power2.out — los trazos no rebotan). */
        tl.fromTo(
          "#cta4-pill",
          { y: 90, opacity: 0 },
          { y: 0, opacity: 1, duration: 0.6, ease: "power3.out" },
          1.0
        );
        tl.fromTo(
          "#cta4-pill-stroke-rect",
          { strokeDashoffset: 100.6 },
          { strokeDashoffset: 0, duration: 0.55, ease: "power2.out" },
          1.8
        );

        /* ── Scene 3 (2.2–3.5s) — URL wipe izquierda→derecha con arista dorada ─
           Signature del blueprint CTA: clip-path inset(right 100%→0%) sobre el
           wrapper de la URL; la arista dorada viaja en sincronía exacta (misma
           duración + ease ⇒ borde del clip = x de la arista). Luego quietud
           total: hold estático ~0.76s hasta el final (frame final del video). */
        tl.fromTo(
          "#cta4-url-wrap",
          { clipPath: "inset(0% 100% 0% 0%)" },
          { clipPath: "inset(0% 0% 0% 0%)", duration: 0.48, ease: "power2.inOut" },
          2.2
        );
        tl.fromTo(
          "#cta4-url-edge",
          { opacity: 0 },
          { opacity: 1, duration: 0.05, ease: "none" },
          2.2
        );
        tl.fromTo(
          "#cta4-url-edge",
          { x: 0 },
          { x: 560, duration: 0.48, ease: "power2.inOut" },
          2.2
        );
        tl.to("#cta4-url-edge", { opacity: 0, duration: 0.12, ease: "power1.out" }, 2.62);
        /* 2.74–3.5: hold estático — fin en quietud total */

        window.__timelines["04-cta"] = tl;
      </script>
    </template>
  </body>
</html>
