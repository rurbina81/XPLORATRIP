<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #FFFFFF;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-width="1080"
      data-height="1920"
    >
      <div
        id="el-01-hook"
        class="scene"
        data-composition-id="01-hook"
        data-composition-src="compositions/frames/01-hook.html"
        data-start="0"
        data-duration="4"
        data-track-index="0"
      ></div>

      <div
        id="el-02-evidencia"
        class="scene"
        data-composition-id="02-evidencia"
        data-composition-src="compositions/frames/02-evidencia.html"
        data-start="4"
        data-duration="4"
        data-track-index="1"
      ></div>

      <div
        id="el-03-beneficio"
        class="scene"
        data-composition-id="03-beneficio"
        data-composition-src="compositions/frames/03-beneficio.html"
        data-start="8"
        data-duration="4"
        data-track-index="0"
      ></div>

      <div
        id="el-04-cta"
        class="scene"
        data-composition-id="04-cta"
        data-composition-src="compositions/frames/04-cta.html"
        data-start="11.5"
        data-duration="3.5"
        data-track-index="1"
      ></div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      // ── frame transitions (injected by transitions.mjs) ──
      (function () { var tl = window.__timelines["main"];
        tl.to("#el-03-beneficio", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 11.5);
        tl.fromTo("#el-04-cta", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 11.5);
        tl.to({}, { duration: 15 }, 0); // full-span anchor — main.duration() == composition total (Studio master duration)
      })();
    </script>
  </body>
</html>
