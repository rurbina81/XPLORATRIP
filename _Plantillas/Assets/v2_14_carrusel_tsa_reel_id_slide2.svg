<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
<rect width="1080" height="1350" fill="#FFFFFF"/>
<text x="900" y="100" fill="#00c2cb" font-family="Inter, sans-serif" font-size="32" font-weight="500" text-anchor="end" letter-spacing="3">02 / 06</text>
<text x="540" y="280" fill="#303030" font-family="Inter, sans-serif" font-size="56" font-weight="800" text-anchor="middle">¿Por qué importa?</text>
<line x1="380" y1="340" x2="700" y2="340" stroke="#eabe48" stroke-width="4"/>
<text x="80" y="500" fill="#303030" font-family="Inter, sans-serif" font-size="40" font-weight="500">Muchos pasajeros NO salen</text>
<text x="80" y="560" fill="#303030" font-family="Inter, sans-serif" font-size="40" font-weight="500">directo desde Miami u Houston.</text>
<text x="80" y="700" fill="#303030" font-family="Inter, sans-serif" font-size="40" font-weight="500">Necesitan vuelo doméstico:</text>
<circle cx="120" cy="800" r="10" fill="#eabe48"/>
<text x="160" y="812" fill="#303030" font-family="Inter, sans-serif" font-size="38" font-weight="500">Dallas → Miami → Caracas</text>
<circle cx="120" cy="870" r="10" fill="#eabe48"/>
<text x="160" y="882" fill="#303030" font-family="Inter, sans-serif" font-size="38" font-weight="500">Chicago → Miami → Caracas</text>
<circle cx="120" cy="940" r="10" fill="#eabe48"/>
<text x="160" y="952" fill="#303030" font-family="Inter, sans-serif" font-size="38" font-weight="500">Orlando → Miami → Caracas</text>
<text x="80" y="1100" fill="#A32D2D" font-family="Inter, sans-serif" font-size="40" font-weight="800">Sin ID válido para TSA</text>
<text x="80" y="1150" fill="#A32D2D" font-family="Inter, sans-serif" font-size="40" font-weight="800">no pasas seguridad.</text>
<text x="540" y="1280" fill="#eabe48" font-family="Inter, sans-serif" font-size="36" font-weight="400" text-anchor="middle" letter-spacing="5">XPLORATRIP</text>
