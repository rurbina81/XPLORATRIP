<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
<rect width="1080" height="1350" fill="#FFFFFF"/>
<text x="900" y="100" fill="#00c2cb" font-family="Inter, sans-serif" font-size="32" font-weight="500" text-anchor="end" letter-spacing="3">05 / 06</text>
<text x="540" y="240" fill="#303030" font-family="Inter, sans-serif" font-size="50" font-weight="800" text-anchor="middle">¿Viajan menores?</text>
<line x1="380" y1="300" x2="700" y2="300" stroke="#eabe48" stroke-width="4"/>
<text x="540" y="450" fill="#303030" font-family="Inter, sans-serif" font-size="50" font-weight="800" text-anchor="middle">Menores de 18 años</text>
<text x="540" y="520" fill="#303030" font-family="Inter, sans-serif" font-size="50" font-weight="800" text-anchor="middle">NO necesitan ID</text>
<text x="540" y="600" fill="#eabe48" font-family="Inter, sans-serif" font-size="40" font-weight="500" text-anchor="middle">para vuelos domésticos en EE.UU.</text>
<text x="540" y="780" fill="#888880" font-family="Inter, sans-serif" font-size="36" font-weight="500" text-anchor="middle">Pero la aerolínea</text>
<text x="540" y="830" fill="#888880" font-family="Inter, sans-serif" font-size="36" font-weight="500" text-anchor="middle">puede tener políticas propias.</text>
<text x="540" y="1000" fill="#303030" font-family="Inter, sans-serif" font-size="38" font-weight="800" text-anchor="middle">Recomendado: llevar documentos</text>
<text x="540" y="1060" fill="#303030" font-family="Inter, sans-serif" font-size="38" font-weight="800" text-anchor="middle">del menor si los tienes.</text>
<text x="540" y="1280" fill="#eabe48" font-family="Inter, sans-serif" font-size="36" font-weight="400" text-anchor="middle" letter-spacing="5">XPLORATRIP</text>
</svg>
