<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
<!-- Fondo grafito principal -->
<rect width="1080" height="1920" fill="#303030"/>

<!-- ZONA 1 — Marca (esquina superior derecha + banda dorada superior) -->
<rect x="0" y="0" width="1080" height="120" fill="#eabe48"/>
<text x="540" y="76" fill="#303030" font-family="Inter, sans-serif" font-size="32" font-weight="800" text-anchor="middle" letter-spacing="6">XPLORATRIP</text>
<line x1="0" y1="140" x2="1080" y2="140" stroke="#00c2cb" stroke-width="3"/>

<!-- ZONA 2 — Visual emocional (silueta de avión + mapa de ruta USA→Venezuela) -->
<g transform="translate(540, 380)">
  <!-- USA point -->
  <circle cx="-280" cy="0" r="24" fill="#FFFFFF"/>
  <text x="-280" y="60" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="24" font-weight="500" text-anchor="middle">USA</text>
  <!-- Ruta arc -->
  <path d="M -260 -10 Q 0 -100 260 -10" fill="none" stroke="#eabe48" stroke-width="4" stroke-dasharray="10 8"/>
  <!-- Avión silueta -->
  <g transform="translate(0, -85) rotate(15)">
    <path d="M -45 0 L 45 -8 L 50 0 L 45 8 L -45 0 Z M -10 -25 L 5 -3 L 15 0 L 5 3 L -10 25 L -20 0 Z" fill="#eabe48"/>
  </g>
  <!-- VZLA point -->
  <circle cx="280" cy="0" r="24" fill="#FFFFFF"/>
  <text x="280" y="60" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="24" font-weight="500" text-anchor="middle">VENEZUELA</text>
</g>

<!-- Línea dorada divisora -->
<line x1="180" y1="540" x2="900" y2="540" stroke="#eabe48" stroke-width="3"/>

<!-- ZONA 3 — Titular principal (mayúsculas bold) -->
<text x="540" y="720" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="92" font-weight="800" text-anchor="middle" letter-spacing="2">TU DOCUMENTO</text>
<text x="540" y="830" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="92" font-weight="800" text-anchor="middle" letter-spacing="2">DEFINE TU RUTA</text>

<!-- ZONA 4 — Subtítulo aclaratorio -->
<text x="540" y="970" fill="#eabe48" font-family="Inter, sans-serif" font-size="38" font-weight="500" text-anchor="middle">Te ayudamos con tu ruta de viaje</text>
<text x="540" y="1020" fill="#eabe48" font-family="Inter, sans-serif" font-size="38" font-weight="500" text-anchor="middle">y orientación para el DEV.</text>

<!-- ZONA 5 — Caja de confianza -->
<rect x="120" y="1130" width="840" height="200" fill="none" stroke="#00c2cb" stroke-width="3" rx="20"/>
<text x="540" y="1200" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="32" font-weight="500" text-anchor="middle">Asistencia paso a paso</text>
<text x="540" y="1250" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="32" font-weight="500" text-anchor="middle">Opciones según tu documento</text>
<text x="540" y="1300" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="32" font-weight="500" text-anchor="middle">Orientación para familias</text>

<!-- ZONA 6 — Pie de CTA (botón pill dorado) -->
<rect x="190" y="1530" width="700" height="140" fill="#eabe48" rx="70"/>
<text x="540" y="1620" fill="#303030" font-family="Inter, sans-serif" font-size="46" font-weight="800" text-anchor="middle">ESCRÍBENOS POR WHATSAPP</text>

<text x="540" y="1750" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="30" font-weight="500" text-anchor="middle" opacity="0.7">Ciudad EE.UU. · fecha tentativa · documento</text>
<text x="540" y="1860" fill="#888880" font-family="Inter, sans-serif" font-size="22" font-weight="400" text-anchor="middle">Precio sujeto a cambios. XPLORATRIP asesora, no emite trámites oficiales.</text>
</svg>
