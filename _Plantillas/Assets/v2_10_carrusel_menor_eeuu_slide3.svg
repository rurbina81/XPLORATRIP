<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
<rect width="1080" height="1350" fill="#FFFFFF"/>
<text x="900" y="100" fill="#00c2cb" font-family="Inter, sans-serif" font-size="32" font-weight="500" text-anchor="end" letter-spacing="3">03 / 06</text>
<rect x="60" y="200" width="220" height="60" fill="#00c2cb"/>
<text x="170" y="244" fill="#303030" font-family="Inter, sans-serif" font-size="32" font-weight="800" text-anchor="middle" letter-spacing="6">ESCENARIO A</text>
<text x="80" y="380" fill="#888880" font-family="Inter, sans-serif" font-size="28" font-weight="500" letter-spacing="3">RUTA POR COLOMBIA TAMBIÉN POSIBLE</text>
<line x1="80" y1="430" x2="540" y2="430" stroke="#eabe48" stroke-width="4"/>
<text x="80" y="560" fill="#303030" font-family="Inter, sans-serif" font-size="42" font-weight="500">Pero los padres deben tener</text>
<text x="80" y="620" fill="#303030" font-family="Inter, sans-serif" font-size="42" font-weight="800">pasaporte venezolano físico.</text>
<text x="80" y="780" fill="#303030" font-family="Inter, sans-serif" font-size="34" font-weight="500">Vigente o vencido con</text>
<text x="80" y="830" fill="#303030" font-family="Inter, sans-serif" font-size="34" font-weight="500">menos de 10 años confirmado.</text>
<text x="80" y="980" fill="#eabe48" font-family="Inter, sans-serif" font-size="32" font-weight="800">El caso debe revisarlo un asesor.</text>
<text x="540" y="1280" fill="#eabe48" font-family="Inter, sans-serif" font-size="36" font-weight="400" text-anchor="middle" letter-spacing="5">XPLORATRIP</text>
</svg>
