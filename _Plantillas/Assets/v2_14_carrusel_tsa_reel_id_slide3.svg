<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
<rect width="1080" height="1350" fill="#FFFFFF"/>
<text x="900" y="100" fill="#00c2cb" font-family="Inter, sans-serif" font-size="32" font-weight="500" text-anchor="end" letter-spacing="3">03 / 06</text>
<text x="540" y="240" fill="#303030" font-family="Inter, sans-serif" font-size="50" font-weight="800" text-anchor="middle">Desde el 7 de mayo 2025:</text>
<line x1="380" y1="300" x2="700" y2="300" stroke="#eabe48" stroke-width="4"/>
<text x="540" y="460" fill="#303030" font-family="Inter, sans-serif" font-size="64" font-weight="800" text-anchor="middle">Licencia o ID estatal</text>
<text x="540" y="540" fill="#eabe48" font-family="Inter, sans-serif" font-size="64" font-weight="800" text-anchor="middle">debe ser REAL ID.</text>
<text x="540" y="700" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500" text-anchor="middle">O presentar otra ID aceptada:</text>
<circle cx="120" cy="830" r="10" fill="#eabe48"/>
<text x="160" y="842" fill="#303030" font-family="Inter, sans-serif" font-size="34" font-weight="500">Pasaporte EE.UU.</text>
<circle cx="120" cy="900" r="10" fill="#eabe48"/>
<text x="160" y="912" fill="#303030" font-family="Inter, sans-serif" font-size="34" font-weight="500">Pasaporte extranjero vigente</text>
<circle cx="120" cy="970" r="10" fill="#eabe48"/>
<text x="160" y="982" fill="#303030" font-family="Inter, sans-serif" font-size="34" font-weight="500">Green Card</text>
<circle cx="120" cy="1040" r="10" fill="#eabe48"/>
<text x="160" y="1052" fill="#303030" font-family="Inter, sans-serif" font-size="34" font-weight="500">EAD (Employment Authorization)</text>
<circle cx="120" cy="1110" r="10" fill="#eabe48"/>
<text x="160" y="1122" fill="#303030" font-family="Inter, sans-serif" font-size="34" font-weight="500">Global Entry / NEXUS / SENTRI</text>
<text x="540" y="1280" fill="#eabe48" font-family="Inter, sans-serif" font-size="36" font-weight="400" text-anchor="middle" letter-spacing="5">XPLORATRIP</text>
</svg>
