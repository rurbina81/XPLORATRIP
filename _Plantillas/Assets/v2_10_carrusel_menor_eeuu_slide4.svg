<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
<rect width="1080" height="1350" fill="#FFFFFF"/>
<text x="900" y="100" fill="#00c2cb" font-family="Inter, sans-serif" font-size="32" font-weight="500" text-anchor="end" letter-spacing="3">04 / 06</text>
<rect x="60" y="200" width="220" height="60" fill="#eabe48"/>
<text x="170" y="244" fill="#303030" font-family="Inter, sans-serif" font-size="32" font-weight="800" text-anchor="middle" letter-spacing="6">ESCENARIO B</text>
<text x="80" y="420" fill="#303030" font-family="Inter, sans-serif" font-size="52" font-weight="800">Solo tiene partida</text>
<text x="80" y="490" fill="#303030" font-family="Inter, sans-serif" font-size="52" font-weight="800">de nacimiento de EE.UU.</text>
<line x1="80" y1="550" x2="500" y2="550" stroke="#eabe48" stroke-width="5"/>
<circle cx="120" cy="680" r="10" fill="#A32D2D"/>
<text x="160" y="692" fill="#303030" font-family="Inter, sans-serif" font-size="32" font-weight="500">No se recomienda</text>
<text x="160" y="738" fill="#303030" font-family="Inter, sans-serif" font-size="32" font-weight="500">ruta por Colombia.</text>
<circle cx="120" cy="850" r="10" fill="#eabe48"/>
<text x="160" y="862" fill="#303030" font-family="Inter, sans-serif" font-size="32" font-weight="500">Hay que registrar al menor</text>
<text x="160" y="908" fill="#303030" font-family="Inter, sans-serif" font-size="32" font-weight="500">en Venezuela primero.</text>
<circle cx="120" cy="1020" r="10" fill="#eabe48"/>
<text x="160" y="1032" fill="#303030" font-family="Inter, sans-serif" font-size="32" font-weight="500">Luego se gestiona DEV</text>
<text x="160" y="1078" fill="#303030" font-family="Inter, sans-serif" font-size="32" font-weight="500">para el menor.</text>
<text x="540" y="1280" fill="#eabe48" font-family="Inter, sans-serif" font-size="36" font-weight="400" text-anchor="middle" letter-spacing="5">XPLORATRIP</text>
</svg>
