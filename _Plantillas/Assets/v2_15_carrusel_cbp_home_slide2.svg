<text x="80" y="900" fill="#A32D2D" font-family="Inter, sans-serif" font-size="46" font-weight="800">XPLORATRIP NO es</text>
<text x="80" y="960" fill="#A32D2D" font-family="Inter, sans-serif" font-size="46" font-weight="800">autoridad migratoria.</text>
<text x="540" y="1280" fill="#eabe48" font-family="Inter, sans-serif" font-size="36" font-weight="400" text-anchor="middle" letter-spacing="5">XPLORATRIP</text>
