<text x="80" y="430" fill="#303030" font-family="Inter, sans-serif" font-size="42" font-weight="500">Es un proceso del</text>
<text x="80" y="490" fill="#303030" font-family="Inter, sans-serif" font-size="42" font-weight="800">gobierno de Estados Unidos</text>
<text x="80" y="580" fill="#303030" font-family="Inter, sans-serif" font-size="42" font-weight="500">relacionado con la intención</text>
<text x="80" y="640" fill="#303030" font-family="Inter, sans-serif" font-size="42" font-weight="500">de salida voluntaria.</text>
