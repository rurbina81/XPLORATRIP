<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
<rect width="1080" height="1350" fill="#FFFFFF"/>
<text x="900" y="100" fill="#00c2cb" font-family="Inter, sans-serif" font-size="32" font-weight="500" text-anchor="end" letter-spacing="3">02 / 05</text>
<text x="80" y="240" fill="#eabe48" font-family="Inter, sans-serif" font-size="48" font-weight="800">¿Qué es CBP Home?</text>
