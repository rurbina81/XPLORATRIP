<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
<rect width="1080" height="1350" fill="#FFFFFF"/>
<text x="900" y="100" fill="#00c2cb" font-family="Inter, sans-serif" font-size="32" font-weight="500" text-anchor="end" letter-spacing="3">03 / 05</text>
<text x="80" y="240" fill="#eabe48" font-family="Inter, sans-serif" font-size="48" font-weight="800">Lo que NO hacemos:</text>
<line x1="80" y1="280" x2="600" y2="280" stroke="#eabe48" stroke-width="5"/>
<circle cx="120" cy="430" r="14" fill="#A32D2D"/>
<text x="160" y="442" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500">NO gestionamos CBP Home.</text>
<circle cx="120" cy="540" r="14" fill="#A32D2D"/>
<text x="160" y="552" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500">NO garantizamos bonos</text>
<text x="160" y="598" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500">o beneficios migratorios.</text>
<circle cx="120" cy="690" r="14" fill="#A32D2D"/>
<text x="160" y="702" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500">NO damos asesoría legal</text>
<text x="160" y="748" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500">sobre consecuencias migratorias.</text>
<circle cx="120" cy="840" r="14" fill="#A32D2D"/>
<text x="160" y="852" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500">CBP Home NO es requisito</text>
<text x="160" y="898" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500">para viajar con XPLORATRIP.</text>
<text x="540" y="1280" fill="#eabe48" font-family="Inter, sans-serif" font-size="36" font-weight="400" text-anchor="middle" letter-spacing="5">XPLORATRIP</text>
</svg>
