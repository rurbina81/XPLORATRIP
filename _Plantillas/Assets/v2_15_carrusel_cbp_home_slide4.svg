<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" width="1080" height="1350">
<rect width="1080" height="1350" fill="#FFFFFF"/>
<text x="900" y="100" fill="#00c2cb" font-family="Inter, sans-serif" font-size="32" font-weight="500" text-anchor="end" letter-spacing="3">04 / 05</text>
<text x="80" y="240" fill="#00c2cb" font-family="Inter, sans-serif" font-size="38" font-weight="800" letter-spacing="3">IMPORTANTE</text>
<line x1="80" y1="280" x2="400" y2="280" stroke="#00c2cb" stroke-width="4"/>
<text x="80" y="420" fill="#303030" font-family="Inter, sans-serif" font-size="44" font-weight="800">Si tienes caso migratorio activo:</text>
<circle cx="120" cy="560" r="10" fill="#eabe48"/>
<text x="160" y="572" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500">Asilo pendiente</text>
<circle cx="120" cy="640" r="10" fill="#eabe48"/>
<text x="160" y="652" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500">TPS, parole, EAD activo</text>
<circle cx="120" cy="720" r="10" fill="#eabe48"/>
<text x="160" y="732" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500">Corte de inmigración pendiente</text>
<circle cx="120" cy="800" r="10" fill="#eabe48"/>
<text x="160" y="812" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500">Orden de deportación</text>
<circle cx="120" cy="880" r="10" fill="#eabe48"/>
<text x="160" y="892" fill="#303030" font-family="Inter, sans-serif" font-size="36" font-weight="500">Ajuste de estatus, petición familiar</text>
<line x1="80" y1="990" x2="1000" y2="990" stroke="#eabe48" stroke-width="3"/>
<text x="540" y="1080" fill="#eabe48" font-family="Inter, sans-serif" font-size="44" font-weight="800" text-anchor="middle">Consulta a un abogado</text>
<text x="540" y="1140" fill="#eabe48" font-family="Inter, sans-serif" font-size="44" font-weight="800" text-anchor="middle">de inmigración antes.</text>
<text x="540" y="1280" fill="#eabe48" font-family="Inter, sans-serif" font-size="36" font-weight="400" text-anchor="middle" letter-spacing="5">XPLORATRIP</text>
</svg>
