<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
<rect width="1080" height="1920" fill="#303030"/>
<text x="540" y="720" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="60" font-weight="500" text-anchor="middle">El miedo más común</text>
<text x="540" y="800" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="60" font-weight="500" text-anchor="middle">de muchos viajeros:</text>
<line x1="380" y1="870" x2="700" y2="870" stroke="#eabe48" stroke-width="4"/>
<text x="540" y="1020" fill="#eabe48" font-family="Inter, sans-serif" font-size="68" font-weight="800" text-anchor="middle">"quedarme varado</text>
<text x="540" y="1110" fill="#eabe48" font-family="Inter, sans-serif" font-size="68" font-weight="800" text-anchor="middle">en la frontera."</text>
<text x="540" y="1750" fill="#eabe48" font-family="Inter, sans-serif" font-size="42" font-weight="400" text-anchor="middle" letter-spacing="6">XPLORATRIP</text>
